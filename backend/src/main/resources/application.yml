spring:
  datasource:
    url: jdbc:postgresql://db:5432/urbano
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

server:
  port: 8080
  address: 0.0.0.0

upload:
  dir: /app/uploads