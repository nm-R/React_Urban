services:

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16
    container_name: urbanodb
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       urbano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ─────────────────────────────────────
  app:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
    container_name: urbano-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - fotos_data:/app/uploads

  # ── React Web Frontend ──────────────────────────────────
  web:
    build:
      context: ./web
    container_name: urbano-web
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  postgres_data:
  fotos_data:
